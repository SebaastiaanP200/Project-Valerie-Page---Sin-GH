<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="register.css" />
    <title>Registro</title>
</head>
<body>
    <form action="" method="" class="register__form">
        <h1>Registro</h1>
        <label class="register__name">Nombre</label>
        <input class="register__iName" type="text" placeholder="Nombre" />
        <label class="register__lastname">Apellido</label>
        <input class="register__iLastname" type="text" placeholder="Apellido" />
        <label class="register__email">Correo electrónico</label>
        <input class="register__iEmail" type="email" placeholder="Email" />
        <label class="register__password">Contraseña</label>
        <input class="register__iPassword" type="password" placeholder="Contraseña" />
        <label class="register__cPassword">Confirmar contraseña</label>
        <input class="register__iCpassword" type="password" placeholder="Confirmar contraseña" />
        <button class="register__btn" type="submit">Regístrate</button>
        <span class="register__account">¿Ya tienes cuenta?
            <a class="register__account --a" href="login.html">Iniciar Sesión</a></span>
      </form>
</body>
</html>
