<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
	<link rel="stylesheet" href="/css/fonts.css">
    <link rel="stylesheet" href="/css/register.css" />
    <title>Register</title>
</head>
<body>
	<form class="register__form">
		<h1>Registro</h1>
		<label class="register__user">Usuario</label>
		<input id="user" class="register__iUser" type="text" placeholder="Usuario" />
		<label class="register__email">Email</label>
		<input id="email" class="register__iEmail" type="email" placeholder="Email" />
		<label class="register__password">Contraseña</label>
		<input id="password" class="register__iPassword" type="password" placeholder="Contraseña" />
		<label class="register__cPassword">Confirmar contraseña</label>
		<input id="c__password" class="register__iCpassword" type="password" placeholder="Confirmar contraseña" />
		<button id="register__btn" class="register__btn" type="submit">Regístrate</button>
		<span class="register__account">¿Ya tienes cuenta?
			<a class="register__account --a" href="/html/login.html">Iniciar Sesión</></span>
	</form>

	<script type="module" src="/js/register.js"></script>		
</body>
</html>
