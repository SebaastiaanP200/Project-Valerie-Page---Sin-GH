<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="/css/login.css" />
	<title>Login</title>
</head>
<body>
		<form class="login__form">
			<h1>Iniciar Sesión</h1>
			<label class="login__email">Correo electrónico</label>
			<input id="email" class="login__iEmail" type="text" placeholder="Email" />
			<label class="login__password">Contraseña</label>
			<input id="password" class="login__iPassword" type="password" placeholder="Password" minlength="6" />
			<span class="login__fPassword">¿Olvidaste tu contraseña?
				<a class="login__fPassword --a" href="/html/forgot_password.html">Recuperar</a></span>
			<button id="login__btn" class="login__btn" type="submit">Iniciar sesión</button>
			<span class="login__rAccount">¿No tienes cuenta?
				<a class="login__rAccount --a" href="/html/register.html">Regístrate</a></span>
		</form>
