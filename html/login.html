<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="login.css" />
    <title>Login</title>
</head>
<body>
    <dialog class="login__modal">
    <form action="" method="" class="login__form">
        <h1>Iniciar Sesión</h1>
        <label class="login__email">Correo electrónico</label>
        <input class="login__iEmail" type="text" placeholder="Email" />
        <label class="login__password">Contraseña</label>
        <input class="login__iPassword" type="password" placeholder="Password" minlength="6" />
        <span class="login__fPassword">¿Olvidaste tu contraseña?
            <a class="login__fPassword --a" href="forgot_password.html">Recuperar</a></span>
        <button class="login__btn" type="submit">Iniciar sesión</button>
        <span class="login__rAccount">¿No tienes cuenta?
            <a class="login__rAccount --a" href="register.html">Regístrate</a></span>
    </form>
    </dialog>
</body>
</html>
