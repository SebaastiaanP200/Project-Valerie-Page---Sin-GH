<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
	<link rel="stylesheet" href="/css/fonts.css">
	<link rel="stylesheet" href="/css/login.css" />
	<title>Login</title>
</head>
<body>
		<form class="login__form">
			<h1>Iniciar Sesión</h1>
			<label class="login__email">Email</label>
			<div class="email__container">
				<input id="email" class="login__iEmail" type="text" placeholder="Email" />
				<span id="email" class="email material-symbols-outlined">email</span>
			</div>
			<label class="login__password">Contraseña</label>
				<div class="pass__container">
				<input id="password" class="login__iPassword" type="password" placeholder="Password" minlength="6" />
			<span id="togglePass" class="toggle material-symbols-outlined">visibility</span>
			</div>
			<span class="login__fPassword">¿Olvidaste tu contraseña?
				<a class="login__fPassword --a" href="/html/forgot_password.html">Recuperar</a></span>
			<button id="login__btn" class="login__btn" type="submit">Iniciar sesión</button>
			<span class="login__rAccount">¿No tienes cuenta?
				<a class="login__rAccount --a" href="/html/register.html">Regístrate</a></span>
		</form>

	<script type="module" src="/js/login.js"></script>
</body>

</html>
